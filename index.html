<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alshami Store - قريباً</title>
    <!-- استدعاء مكتبة التصميم Tailwind CSS مجاناً -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121324] text-white flex flex-col items-center justify-center min-h-screen font-sans px-4">

    <div class="text-center bg-[#1a1c38] p-8 rounded-2xl shadow-2xl border border-violet-900/5xl max-w-md w-full">
        <!-- شعار مؤقت -->
        <div class="w-20 h-20 bg-gradient-to-tr from-violet-600 to-fuchsia-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-violet-500/30">
            <span class="text-2xl font-bold tracking-wider">AS</span>
        </div>
        
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 mb-3">
            الشامي ستور
        </h1>
        
        <p class="text-gray-400 text-sm mb-6 leading-relaxed">
            الموقع تحت الإنشاء والتطوير حالياً. تم ربط الخوادم والاستضافة بنجاح 100%! 🚀
        </p>

        <div class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-4 py-2 rounded-full text-xs font-semibold">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            الربط التلقائي شغال لايف
        </div>
    </div>

</body>
</html>
